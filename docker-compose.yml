services:
  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver (spans from FastAPI app)
      - "3200:3200"   # Tempo HTTP API (queried by Grafana)

  loki:
    image: grafana/loki:3.0.0
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml
    ports:
      - "3100:3100"   # Loki HTTP API (queried by Grafana and Alloy)

  alloy:
    image: grafana/alloy:v1.1.0
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - /var/run/docker.sock:/var/run/docker.sock  # needed to tail Docker logs
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"   # Grafana UI
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - tempo
      - loki

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - tempo
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317

